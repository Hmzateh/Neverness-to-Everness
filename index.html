<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTE: Neverness to Everness</title>
  <style>
    :root {
      --ink: #ffffff;
      --muted: rgba(255, 255, 255, 0.72);
      --pink: #ff3f91;
      --cyan: #23e4ff;
      --violet: #7c5cff;
      --paper: #fff8fb;
      --line: rgba(17, 17, 24, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 78% 18%, rgba(35, 228, 255, 0.24), transparent 24%),
        radial-gradient(circle at 15% 84%, rgba(255, 63, 145, 0.2), transparent 28%),
        #090910;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.38;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.16) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.16) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: linear-gradient(90deg, #000 0%, transparent 86%);
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(6, 6, 12, 0.72) 0%, rgba(6, 6, 12, 0.45) 37%, rgba(6, 6, 12, 0.08) 100%),
        linear-gradient(0deg, rgba(6, 6, 12, 0.38), rgba(6, 6, 12, 0.08));
    }

    .bg-video {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: brightness(1.18) saturate(1.24) contrast(1.08);
    }

    .page {
      position: relative;
      width: min(100vw, calc(100svh * 16 / 9));
      height: min(100svh, calc(100vw * 9 / 16));
      aspect-ratio: 16 / 9;
      --u: min(1cqw, 1.777cqh);
      container-type: size;
      padding: calc(var(--u) * 1.8) calc(var(--u) * 2.9) calc(var(--u) * 2.35);
      display: grid;
      grid-template-rows: auto 1fr;
      gap: calc(var(--u) * 1.25);
      z-index: 2;
      isolation: isolate;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: calc(var(--u) * 3.9);
      z-index: 2;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      color: var(--ink);
    }

    .logo-img {
      display: block;
      width: calc(var(--u) * 10.7);
      height: auto;
      filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.45));
    }

    main {
      position: relative;
      display: grid;
      grid-template-columns: minmax(calc(var(--u) * 25), 0.92fr) minmax(calc(var(--u) * 29.2), 1.08fr);
      align-items: center;
      gap: calc(var(--u) * 2.36);
      z-index: 1;
    }

    .copy {
      max-width: calc(var(--u) * 43);
      padding-bottom: calc(var(--u) * 1.25);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      background: rgba(8, 8, 16, 0.54);
      backdrop-filter: blur(14px);
      box-shadow: 8px 8px 0 rgba(35, 228, 255, 0.28);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: calc(var(--u) * 41);
      font-size: calc(var(--u) * 4.03);
      line-height: 0.96;
      font-weight: 950;
      text-transform: uppercase;
    }

    h1 span {
      color: var(--pink);
      text-shadow: 3px 3px 0 rgba(35, 228, 255, 0.72);
    }

    .subtext {
      max-width: calc(var(--u) * 36.8);
      margin: calc(var(--u) * 1.4) 0 0;
      font-size: calc(var(--u) * 1.25);
      line-height: 1.55;
      color: rgba(255, 255, 255, 0.82);
      font-weight: 650;
    }

    .cta-row {
      display: grid;
      justify-items: start;
      margin-top: calc(var(--u) * 2.1);
      gap: calc(var(--u) * 0.75);
    }

    .cta {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: calc(var(--u) * 28.5);
      min-height: calc(var(--u) * 5.55);
      padding: 0 calc(var(--u) * 3.1);
      color: #111118;
      background:
        radial-gradient(circle, rgba(17, 17, 24, 0.22) 1px, transparent 1px),
        linear-gradient(135deg, #ff4da2 0%, #ff5dae 48%, #f33791 100%);
      background-size: calc(var(--u) * 0.34) calc(var(--u) * 0.34), 100% 100%;
      border: calc(var(--u) * 0.2) solid #101015;
      border-radius: calc(var(--u) * 0.58);
      text-decoration: none;
      font-size: calc(var(--u) * 2.52);
      font-weight: 950;
      text-transform: uppercase;
      letter-spacing: 0;
      box-shadow:
        0 calc(var(--u) * 0.62) 0 #101015,
        0 calc(var(--u) * 1.5) calc(var(--u) * 2.4) rgba(255, 63, 145, 0.42);
      animation: ctaPulse 1.7s ease-in-out infinite;
    }

    .cta::before {
      content: "";
      position: absolute;
      inset: calc(var(--u) * 0.36);
      border-radius: calc(var(--u) * 0.32);
      border: 1px solid rgba(255, 255, 255, 0.22);
      pointer-events: none;
    }

    .cta span {
      position: relative;
      z-index: 1;
    }

    .cta-label {
      line-height: 1;
      text-shadow:
        calc(var(--u) * 0.08) calc(var(--u) * 0.08) 0 rgba(255, 255, 255, 0.28),
        calc(var(--u) * -0.05) calc(var(--u) * -0.05) 0 rgba(255, 255, 255, 0.18);
    }

    .cta-badge {
      position: absolute;
      right: calc(var(--u) * -5.7);
      bottom: calc(var(--u) * -0.78);
      z-index: 1;
      white-space: nowrap;
      color: #fff;
      font-size: calc(var(--u) * 1.38);
      font-weight: 950;
      line-height: 1;
      text-transform: uppercase;
      text-shadow:
        calc(var(--u) * 0.12) 0 0 #101015,
        calc(var(--u) * -0.12) 0 0 #101015,
        0 calc(var(--u) * 0.12) 0 #101015,
        0 calc(var(--u) * -0.12) 0 #101015,
        calc(var(--u) * 0.16) calc(var(--u) * 0.16) 0 #101015;
      transform: rotate(-2deg);
    }

    .cta-badge strong {
      color: #fff000;
      text-shadow:
        calc(var(--u) * 0.12) 0 0 #101015,
        calc(var(--u) * -0.12) 0 0 #101015,
        0 calc(var(--u) * 0.12) 0 #101015,
        0 calc(var(--u) * -0.12) 0 #101015,
        calc(var(--u) * 0.16) calc(var(--u) * 0.16) 0 #101015;
    }

    .windows-only {
      margin-left: calc(var(--u) * 1.1);
      color: rgba(255, 255, 255, 0.72);
      font-size: calc(var(--u) * 0.78);
      font-weight: 900;
      line-height: 1;
      text-transform: uppercase;
      text-shadow: 0 0 calc(var(--u) * 0.75) rgba(0, 0, 0, 0.72);
    }

    .note {
      display: none;
      max-width: calc(var(--u) * 11.8);
      font-size: calc(var(--u) * 0.83);
      line-height: 1.35;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
    }

    .visual {
      position: relative;
      width: min(100%, calc(var(--u) * 45.2));
      justify-self: end;
      aspect-ratio: 1 / 1;
    }

    .visual::before,
    .visual::after {
      content: "";
      position: absolute;
      border: 2px solid rgba(255, 255, 255, 0.88);
      pointer-events: none;
    }

    .visual::before {
      inset: 7% -3% -2% 9%;
      background: rgba(35, 228, 255, 0.18);
      transform: rotate(3deg);
    }

    .visual::after {
      inset: -3% 7% 10% -2%;
      background: rgba(255, 63, 145, 0.16);
      transform: rotate(-4deg);
      z-index: -1;
    }

    .game-shot {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      border: 3px solid rgba(255, 255, 255, 0.88);
      box-shadow: 18px 18px 0 rgba(17, 17, 24, 0.12);
    }

    .sticker {
      position: absolute;
      right: 0;
      bottom: calc(var(--u) * 2.36);
      padding: calc(var(--u) * 0.83) calc(var(--u) * 1.1);
      color: #111118;
      background: #fff;
      border: 2px solid #111118;
      box-shadow: 7px 7px 0 var(--pink);
      display: none;
      font-size: calc(var(--u) * 0.9);
      font-weight: 950;
      text-transform: uppercase;
      transform: rotate(-3deg);
    }

    @keyframes ctaPulse {
      0%, 100% {
        transform: translateY(0) scale(1);
        filter: saturate(1);
      }
      50% {
        transform: translateY(-3px) scale(1.025);
        filter: saturate(1.25);
      }
    }

  </style>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline aria-hidden="true">
    <source src="nte-bg-clean-3s.mp4" type="video/mp4">
  </video>

  <div class="page">
    <header>
      <a class="logo" href="https://nte.perfectworld.com/en/" aria-label="Neverness to Everness official site">
        <img class="logo-img" src="logo.png" alt="NTE: Neverness to Everness">
      </a>
    </header>

    <main>
      <section class="copy" aria-labelledby="headline">
        <h1 id="headline">Your Night in <span>Hethereau</span> Starts Now</h1>
        <p class="subtext">Race through neon streets, chase impossible anomalies, and turn the city into your playground in NTE: Neverness to Everness.</p>
        <div class="cta-row">
          <a class="cta" href="https://to.pangamer.com/u?p=1" target="_blank" rel="noopener">
            <span class="cta-label">Claim Rewards</span>
            <span class="cta-badge" aria-hidden="true">Get <strong>120</strong> pulls!</span>
          </a>
          <div class="windows-only">Windows only</div>
        </div>
      </section>

      <section class="visual" aria-label="Neverness to Everness game art">
        <img class="game-shot" src="nte-hero.jpg" alt="Neverness to Everness promotional game art">
      </section>
    </main>
  </div>
</body>
</html>
